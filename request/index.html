<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movie2365 Requests</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, Helvetica, sans-serif;
    }

    body{
      background:#0f0f0f;
      overflow:hidden;
    }

    .navbar{
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:70px;
      background:#111;
      border-bottom:1px solid rgba(255,255,255,0.08);

      display:flex;
      align-items:center;
      justify-content:space-between;

      padding:0 30px;

      z-index:1000;
    }

    .left{
      display:flex;
      align-items:center;
      gap:16px;
    }

    .logo{
      width:42px;
      height:42px;
      border-radius:10px;
      object-fit:cover;
    }

    .title{
      color:white;
      font-size:24px;
      font-weight:600;
      text-decoration:none;
      text-shadow:0 0 6px rgba(255,255,255,.15);
    }

    .request-text{
      color:#bdbdbd;
      font-size:15px;
    }

    iframe{
      position:absolute;
      top:70px;
      left:0;
      width:100%;
      height:calc(100vh - 70px);
      border:none;
      background:#111;
    }

  </style>
</head>
<body>

  <div class="navbar">

    <div class="left">
      <img src="/images/logo1.png" class="logo">

      <a href="/" class="title">
        Movie2365
      </a>

      <div class="request-text">
        Requests
      </div>
    </div>

  </div>

  <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSdUkujdbuPY2IiayMdBPOmIQfuMHzC0Z27p-6b3Eo0LXu0yIw/viewform?usp=publish-editor"></iframe>

</body>
</html>
