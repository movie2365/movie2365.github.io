<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Project Hail Mary</title>
  <link rel="stylesheet" href="/css/player.css">
</head>
<body>

  <div class="navbar">
    <a href="/" class="nav-left">
    
      <img src="images/logo1.png" class="logo">

      <div class="site-title">
        Movie2365
      </div>

    </a>
  </div>

  <div class="player-wrapper">
    <div class="video-container" id="videoContainer">

      
      <video id="video" data-src="https://ia600108.us.archive.org/6/items/project-hail-mary-2026_20260527/Project%20Hail%20Mary%20-%20%5B2026%5D.mp4"></video>

      <div class="controls" id="controls">

        <button id="playPause">▶</button>

        <input
          type="range"
          min="0"
          max="100"
          value="0"
          class="progress"
          id="progress"
        >

        <div class="time" id="time">
          0:00 / 0:00
        </div>

        <button id="fullscreen">⛶</button>

      </div>

    </div>
  </div>

  <script>
    const video = document.getElementById("video");
    const playPause = document.getElementById("playPause");
    const progress = document.getElementById("progress");
    const fullscreen = document.getElementById("fullscreen");
    const controls = document.getElementById("controls");
    const container = document.getElementById("videoContainer");
    const time = document.getElementById("time");

    let hideTimeout;

    // ✅ better time format (supports hours)
    const format = (t) => {
      const hrs = Math.floor(t / 3600);
      const mins = Math.floor((t % 3600) / 60);
      const secs = Math.floor(t % 60).toString().padStart(2, "0");

      if (isNaN(t)) return "0:00";

      if (hrs > 0) {
        return `${hrs}:${mins.toString().padStart(2, "0")}:${secs}`;
      }
      return `${mins}:${secs}`;
    };

    // ✅ load duration properly (fixes 0:00 / 0:00 bug)
    video.addEventListener("loadedmetadata", () => {
      time.textContent = `0:00 / ${format(video.duration)}`;
    });

    // PLAY / PAUSE
    playPause.addEventListener("click", () => {
      if(video.paused){
        video.play();
        playPause.textContent = "❚❚";
      } else {
        video.pause();
        playPause.textContent = "▶";
      }
    });

    // UPDATE PROGRESS
    video.addEventListener("timeupdate", () => {
      const percent =
        (video.currentTime / video.duration) * 100;

      progress.value = percent || 0;

      time.textContent =
        `${format(video.currentTime)} / ${format(video.duration)}`;
    });

    // SEEK
    progress.addEventListener("input", () => {
      video.currentTime =
        (progress.value / 100) * video.duration;
    });

    // FULLSCREEN
    fullscreen.addEventListener("click", () => {
      if(!document.fullscreenElement){
        container.requestFullscreen();
      } else {
        document.exitFullscreen();
      }
    });

    // CONTROLS HIDE
    const showControls = () => {
      controls.classList.remove("hide");

      clearTimeout(hideTimeout);

      hideTimeout = setTimeout(() => {
        if(!video.paused){
          controls.classList.add("hide");
        }
      }, 2500);
    };

    container.addEventListener("mousemove", showControls);

    video.addEventListener("play", showControls);

    video.addEventListener("pause", () => {
      controls.classList.remove("hide");
    });

  </script>

</body>
</html>
